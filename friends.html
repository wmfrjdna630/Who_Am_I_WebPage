<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Friends</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="stage">
    <main class="frame" id="frameFriends">
      <div class="canvas frame-friends" id="canvasFriends">

        <!-- ✅ 실제 컨텐츠 래퍼(등장 애니메이션용) -->
        <div class="friends-enter" id="friendsEnter">
          <div class="friends-pattern" aria-hidden="true"></div>
          <img class="friends-artboard" src="./assets/friends_back.png" alt="" draggable="false" />

          <div class="friends-sub">여정엔 항상 친구가 필요한 법이랍니다,</div>
          <div class="friends-title">그녀와 함께하는 귀엽고 깜찍한 친구를 골라주세요</div>

          <div class="friends-num n1">1</div>
          <div class="friends-num n2">2</div>
          <div class="friends-num n3">3</div>
          <div class="friends-num n4">4</div>

          <button class="animal a1" type="button" aria-label="뱀 선택">
            <img class="animal-basic" src="./assets/snake_basic.png" alt="" draggable="false" />
            <img class="animal-color" src="./assets/snake.png" alt="" draggable="false" />
          </button>

          <button class="animal a2" type="button" aria-label="개구리 선택">
            <img class="animal-basic" src="./assets/frog_basic.png" alt="" draggable="false" />
            <img class="animal-color" src="./assets/frog.png" alt="" draggable="false" />
          </button>

          <button class="animal a3" type="button" aria-label="거미 선택">
            <img class="animal-basic" src="./assets/spider_basic.png" alt="" draggable="false" />
            <img class="animal-color" src="./assets/spider.png" alt="" draggable="false" />
          </button>

          <button class="animal a4" type="button" aria-label="도마뱀 선택">
            <img class="animal-basic" src="./assets/91_basic.png" alt="" draggable="false" />
            <img class="animal-color" src="./assets/91.png" alt="" draggable="false" />
          </button>
        </div>

        <canvas class="star-trail" id="starTrail" width="1440" height="1024" aria-hidden="true"></canvas>

        <!-- ✅✅ overlay를 canvas 직속으로 둬서 1440×1024를 무조건 덮게 함 -->
        <div class="friends-overlay" id="friendsOverlay" aria-hidden="true">
          <div class="black-fill"></div>

          <img
            class="black-cloud"
            id="blackCloud"
            src="./assets/black_cloud.png"
            alt=""
            draggable="false"
          />

          <div class="cloud-text cloud-text-1" id="cloudText1">
            맞아요,<br>눈썰미가 있으시군요 ~
          </div>

          <div class="cloud-text cloud-text-2" id="cloudText2">
            그대, 행복한 악몽 되기를!
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    // ✅ index/moon과 완전히 동일한 스케일 계산
    const BASE_W = 1440;
    const BASE_H = 1024;

    const frame = document.getElementById("frameFriends");
    const canvas = document.getElementById("canvasFriends");

    function setScale() {
      const s = Math.min(
        1,
        (window.innerWidth - 40) / BASE_W,
        (window.innerHeight - 40) / BASE_H
      );
      frame.style.setProperty("--s", s);
      canvas.style.setProperty("--s", s);
    }

    window.addEventListener("resize", setScale);
    setScale();

    // (선택) friends 첫 등장 부드럽게
    const enter = document.getElementById("friendsEnter");
    requestAnimationFrame(() => enter?.classList.add("is-on"));

// ===============================
// ✨ 은하수/별가루 트레일 (1440×1024 고정 좌표계 + scale 완벽 호환)
// ===============================
const starCanvas = document.getElementById("starTrail");
const starCtx = starCanvas?.getContext("2d", { alpha: true });

/* 성능/감성 튜닝값 */
const STAR_MAX = 140;           // 화면에 유지되는 입자 최대치
const STAR_SPAWN_RATE = 3;      // 마우스 이동 1회당 생성 개수
const STAR_LIFE_MIN = 420;      // ms
const STAR_LIFE_MAX = 900;      // ms
const STAR_SPEED_MIN = 0.35;
const STAR_SPEED_MAX = 1.45;

/* 은하수 컬러 팔레트(은은한 푸/보 + 화이트) */
const STAR_COLORS = [
  "rgba(221,241,255,0.98)",
  "rgba(221,241,255,0.92)",
  "rgba(221,241,255,0.85)"
];

let starParticles = [];
let starRunning = true;
let lastMouse = null;

// index처럼 frame 기준 실제 스케일을 얻는다 (frameRect.width / 1440)
function getScaleFriends(){
  const rect = frame.getBoundingClientRect();
  return rect.width / 1440;
}

// frame 내부에서만 생성되게 (바깥으로 나가면 멈춤)
function getLocalPosFromEvent(e){
  const rect = frame.getBoundingClientRect();
  const s = getScaleFriends();

  const cx = (e.clientX - rect.left) / s;
  const cy = (e.clientY - rect.top) / s;

  if (cx < 0 || cy < 0 || cx > 1440 || cy > 1024) return null;
  return { x: cx, y: cy };
}

function rand(min, max){ return min + Math.random() * (max - min); }
function pick(arr){ return arr[(Math.random() * arr.length) | 0]; }

function spawnStars(x, y, dx, dy){
  if (!starRunning) return;

  // 마우스 이동 방향이 있으면 그 방향으로 "촤라락" 흐름을 준다
  const dirLen = Math.hypot(dx, dy) || 1;
  const ndx = dx / dirLen;
  const ndy = dy / dirLen;

  for (let i = 0; i < STAR_SPAWN_RATE; i++){
    if (starParticles.length >= STAR_MAX) starParticles.shift();

    // 마우스 주변 랜덤 오프셋(은하수 흩날림)
    const ox = rand(-10, 10);
    const oy = rand(-10, 10);

    // 이동 벡터: 마우스 진행 방향 + 랜덤 퍼짐
    const speed = rand(STAR_SPEED_MIN, STAR_SPEED_MAX);
    const spread = rand(0.35, 1.1);

    const vx = (ndx * speed * rand(0.6, 1.2)) + rand(-spread, spread);
    const vy = (ndy * speed * rand(0.6, 1.2)) + rand(-spread, spread);

    const life = rand(STAR_LIFE_MIN, STAR_LIFE_MAX);

    starParticles.push({
      x: x + ox,
      y: y + oy,
      px: x + ox,
      py: y + oy,
      vx,
      vy,
      t: 0,
      life,
      size: rand(0.7, 2.0),
      glow: rand(2.5, 7.5),
      color: pick(STAR_COLORS),
      twist: rand(-0.03, 0.03) // 살짝 휘는 느낌
    });
  }
}

function drawParticle(p, alpha){
  // “촤라락” 느낌: 점 + 짧은 선(이전 위치->현재 위치)
  starCtx.save();
  starCtx.globalCompositeOperation = "lighter";
  starCtx.globalAlpha = alpha;

  // 은은한 글로우
  starCtx.shadowBlur = p.glow;
  starCtx.shadowColor = p.color;

  // 라인(꼬리)
  starCtx.strokeStyle = p.color;
  starCtx.lineWidth = Math.max(0.6, p.size);
  starCtx.beginPath();
  starCtx.moveTo(p.px, p.py);
  starCtx.lineTo(p.x, p.y);
  starCtx.stroke();

  // 핵심 점(반짝)
  starCtx.fillStyle = p.color;
  starCtx.beginPath();
  starCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  starCtx.fill();

  starCtx.restore();
}

let lastFrame = performance.now();
function tickStars(now){
  if (!starCtx) return;

  const dt = now - lastFrame;
  lastFrame = now;

  // 완전 투명 레이어라서 "검정 페이드 덮기" 같은 방식은 안 씀(밑이 어두워짐 방지)
  starCtx.clearRect(0, 0, 1440, 1024);

  // 업데이트 + 그리기
  const next = [];
  for (const p of starParticles){
    p.t += dt;
    if (p.t >= p.life) continue;

    // 알파 곡선: 초반 반짝 -> 중반 유지 -> 후반 서서히 사라짐
    const u = p.t / p.life;
    const alpha = (u < 0.15)
      ? (u / 0.15) * 0.9
      : (u < 0.75)
        ? 0.9
        : (1 - (u - 0.75) / 0.25) * 0.9;

    // 살짝 휘는(은하수 흐름) 느낌
    const tvx = p.vx - p.vy * p.twist;
    const tvy = p.vy + p.vx * p.twist;

    p.px = p.x;
    p.py = p.y;

    p.x += tvx * (dt / 16.67);
    p.y += tvy * (dt / 16.67);

    drawParticle(p, alpha);
    next.push(p);
  }

  starParticles = next;
  requestAnimationFrame(tickStars);
}

if (starCanvas && starCtx){
  // 마우스 이동 시 생성
  window.addEventListener("mousemove", (e) => {
    const pos = getLocalPosFromEvent(e);
    if (!pos) { lastMouse = null; return; }

    if (!lastMouse){
      lastMouse = { x: pos.x, y: pos.y };
      spawnStars(pos.x, pos.y, 1, 0);
      return;
    }

    const dx = pos.x - lastMouse.x;
    const dy = pos.y - lastMouse.y;

    // 너무 미세한 움직임은 생성 안 해서 "지저분함" 방지
    if (Math.hypot(dx, dy) >= 0.8){
      spawnStars(pos.x, pos.y, dx, dy);
      lastMouse = { x: pos.x, y: pos.y };
    }
  });

  // 터치(모바일)도 살짝 지원 (필요 없으면 지워도 됨)
  window.addEventListener("touchmove", (e) => {
    const t = e.touches?.[0];
    if (!t) return;
    const pos = getLocalPosFromEvent(t);
    if (!pos) return;
    spawnStars(pos.x, pos.y, 1, 0);
  }, { passive: true });

  requestAnimationFrame(tickStars);
}
    
    // ====== 동물 선택(1개) + black_cloud 연출 ======
    const animals = Array.from(document.querySelectorAll(".animal"));
    let selected = null;
    let sequenceStarted = false;

    const overlay = document.getElementById("friendsOverlay");
    const cloud = document.getElementById("blackCloud");
    const t1 = document.getElementById("cloudText1");
    const t2 = document.getElementById("cloudText2");

    const CLOUD_W = 974;
    const CLOUD_H = 618;
    const FRAME_W = 1440;
    const FRAME_H = 1024;

    function runCloudSequence() {
      if (sequenceStarted) return;
      sequenceStarted = true;

      // ✨ 별가루는 이때 사라지게(감성 전환)
      starRunning = false;
      starCanvas?.classList.add("is-off");

      animals.forEach(btn => btn.disabled = true);

      overlay.classList.add("is-on");

      // 1) 중앙 등장 + 문구1
      cloud.style.setProperty("--cloud-scale", "1");
      t1.classList.add("is-on");

      // 2) 전체 덮기 + 문구2
      const frameDiag = Math.hypot(FRAME_W, FRAME_H);
      const cloudBase = Math.max(CLOUD_W, CLOUD_H);
      const coverScale = (frameDiag / cloudBase) * 1.35;

      setTimeout(() => {
        t1.classList.remove("is-on");
        t2.classList.add("is-on");

        overlay.classList.add("is-expand");
        cloud.style.setProperty("--cloud-scale", String(coverScale));

        // ✅ 검정이 충분히 덮인 뒤 next로 이동
        // - black-fill transition: 900ms
        // - expand 시작이 900ms 시점이므로, 900 + 900 = 1800ms 즈음에 완전 검정
        // - 살짝 여유를 두고 950ms 후 이동(총 1850ms)
        setTimeout(() => {
          window.location.href = "./moon-room.html";
        }, 950);

      }, 900);
    }

    animals.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (selected) selected.classList.remove("is-selected");
        selected = btn;
        selected.classList.add("is-selected");

        runCloudSequence();
      });
    });
  </script>
</body>
</html>
