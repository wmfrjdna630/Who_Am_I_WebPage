<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moon Room</title>
  <link rel="stylesheet" href="./style.css" />

  <!-- ✅ Three.js ESM importmap -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <style>
    .moonroom-webgl{
      position:absolute;
      left:0; top:0;
      width:1440px;
      height:1024px;
      z-index:2;
      pointer-events:auto;
    }

    .moonroom-fade{
      position:absolute;
      inset:0;
      background:#000;
      opacity:1;
      transition: opacity 900ms ease;
      z-index:9998;
      pointer-events:none;
    }
    .moonroom-fade.is-off{ opacity:0; }

    /* =========================
       ✅ 별가루 트레일 스타일
       ========================= */
    .star-trail{
      position:absolute;
      inset:0;
      width:1440px;
      height:1024px;
      pointer-events:none;
      z-index:3; /* WebGL 위에 표시 */
      opacity:1;
      transition: opacity 500ms ease;
      filter: blur(0.2px);
    }
    .star-trail.is-off{
      opacity:0;
    }

    /* =========================
       ✅ Moon Room – Navigation Tokens
       ========================= */
    .nav-tokens{
      position:absolute;
      left:48px;
      top:48px;
      display:flex;
      align-items:center;
      gap:18px;

      z-index:9997;
      pointer-events:auto;

      transform: scale(0.68);
      transform-origin: left top;
    }

    .nav-token{
      appearance:none;
      border:0;
      background:transparent;
      padding:0;
      margin:0;
      cursor:pointer;
      line-height:0;
    }

    .nav-token img{
      display:block;
      width:64px;
      height:64px;
      user-select:none;
      -webkit-user-drag:none;
      transform: translateZ(0);
    }

    .nav-token:hover img{ opacity:0.9; }
    .nav-token:active img{ transform: translateZ(0) scale(0.98); }

    /* =========================
       ✅ BOOK POPUP (추가)
       - canvas(1440x1024) 위에 뜨는 DOM 팝업
       ========================= */
    .moon-popup-overlay{
      position:absolute;
      left:0; top:0;
      width:1440px;
      height:1024px;

      background: rgba(0,0,0,0.62);
      opacity:0;
      pointer-events:none;
      transition: opacity 220ms ease;

      z-index:10000;
    }
    .moon-popup-overlay.is-on{
      opacity:1;
      pointer-events:auto;
    }

    .moon-popup{
      position:absolute;
      left:50%;
      top:50%;
      transform: translate(-50%, -50%) scale(0.985);
      transform-origin:center center;
      opacity:0;
      pointer-events:none;
      transition: opacity 220ms ease, transform 220ms ease;
      z-index:10001; /* overlay(10000)보다 위 */
    }
    .moon-popup.is-on{
      opacity:1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events:auto;
    }

    /* ✅ 팝업이 닫혀있을 때 모든 자식 요소도 클릭 막기 */
    .moon-popup:not(.is-on) * {
      pointer-events:none !important;
    }

    .moon-popup > img{
      display:block;
      user-select:none;
      -webkit-user-drag:none;
      max-width: 90vw;
      max-height: 90vh;
      width: auto;
      height: auto;
      object-fit: contain;
      min-width: 200px;
      min-height: 200px;
    }

    .moon-popup-close{
      position:absolute;
      top:22px;     /* ✅ 우상단 X 위치(필요하면 조정) */
      right:22px;
      width:44px;
      height:44px;
      padding:0;
      border:0;
      background:transparent;
      cursor:pointer;
      line-height:0;
      z-index:10002; /* ✅ 슬라이더 위에 표시 */
    }
    .moon-popup-close img{
      display:block;
      width:44px;
      height:44px;
      user-select:none;
      -webkit-user-drag:none;
    }
    .moon-popup-close:hover{ opacity:0.9; }
    .moon-popup-close:active{ transform: scale(0.98); }

    /* =========================
       ✅ 슬라이더 스타일 (딱딱 나오는 형식)
       ========================= */
    .moon-popup-bg{
      position:relative;
      z-index:1;
    }

    .moon-popup-slider{
      position:absolute;
      left:50%;
      top:50%;
      transform: translate(-50%, -50%);
      /* ✅ moon_popup1의 검은색 부분에 맞추기 - 필요시 조정 */
      width:92%;
      height:92%;
      z-index:2;
      pointer-events:none;
      overflow:hidden;
    }

    .moon-popup-slider-track{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:100%;
    }

    .moon-popup-slide{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:100%;
      object-fit: contain;
      object-position: center;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:auto;
      opacity:0;
      transition: opacity 0ms; /* 딱딱 나오도록 transition 제거 */
    }
    .moon-popup-slide.is-active{
      opacity:1;
    }

    /* ✅ 화살표 버튼 */
    .moon-popup-arrow{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width:48px;
      height:48px;
      padding:0;
      border:0;
      background:transparent;
      cursor:pointer;
      line-height:0;
      z-index:10003; /* ✅ X버튼보다 위에 */
      opacity:0.85;
      transition: opacity 200ms ease;
      pointer-events:auto;
    }
    .moon-popup-arrow:hover{ opacity:1; }
    .moon-popup-arrow:active{ transform: translateY(-50%) scale(0.95); }

    .moon-popup-arrow-left{
      left:100px;
    }
    .moon-popup-arrow-right{
      right:100px;
    }

    .moon-popup-arrow img{
      display:block;
      width:100%;
      height:100%;
      object-fit: contain; /* ✅ 찌그러짐 방지 */
      user-select:none;
      -webkit-user-drag:none;
    }

    /* ✅ 첫 페이지/마지막 페이지에서 화살표 숨기기 (선택사항) */
    .moon-popup-slider[data-page="0"] .moon-popup-arrow-left{
      opacity:0.3;
      pointer-events:none;
    }
    /* 마지막 페이지 (book1, book4: 4번, book2, book3: 5번) */
    #moonPopup1Slider[data-page="4"] .moon-popup-arrow-right,
    #moonPopup4Slider[data-page="4"] .moon-popup-arrow-right,
    #moonPopup2Slider[data-page="5"] .moon-popup-arrow-right,
    #moonPopup3Slider[data-page="5"] .moon-popup-arrow-right{
      opacity:0.3;
      pointer-events:none;
    }
  </style>
</head>

<body>

                <img class="moon-popup-slide" src="./assets/moon_popup1-4.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup1-5.png" alt="" draggable="false" />
              </div>

            <!-- ✅ 화살표 버튼 -->

              <img src="./assets/left_arrow.png" alt="" draggable="false" />

            <button class="moon-popup-arrow moon-popup-arrow-right" type="button" data-slider="moonPopup1" data-direction="next" aria-label="다음 페이지">

          </div>

          <div class="moon-popup" id="moonPopup2" aria-label="moon popup 2">
            <img class="moon-popup-bg" src="./assets/moon_popup2.png" alt="" draggable="false" />
            
            <!-- ✅ 슬라이더 컨테이너 -->
            <div class="moon-popup-slider" id="moonPopup2Slider">
              <div class="moon-popup-slider-track">
                <img class="moon-popup-slide" src="./assets/moon_popup2-1.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup2-2.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup2-3.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup2-4.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup2-5.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup2-6.png" alt="" draggable="false" />
              </div>
            </div>

            <!-- ✅ 화살표 버튼 -->
            <button class="moon-popup-arrow moon-popup-arrow-left" type="button" data-slider="moonPopup2" data-direction="prev" aria-label="이전 페이지">

            <button class="moon-popup-close" type="button" data-popup-close aria-label="close popup">

          <div class="moon-popup" id="moonPopup3" aria-label="moon popup 3">
            <img class="moon-popup-bg" src="./assets/moon_popup3.png" alt="" draggable="false" />
            
            <!-- ✅ 슬라이더 컨테이너 -->
            <div class="moon-popup-slider" id="moonPopup3Slider">
              <div class="moon-popup-slider-track">
                <img class="moon-popup-slide" src="./assets/moon_popup3-1.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup3-2.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup3-3.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup3-4.png" alt="" draggable="false" />
                <img class="moon-popup-slide" src="./assets/moon_popup3-5.png" alt="" draggable="false" />

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { OutlinePass } from "three/addons/postprocessing/OutlinePass.js";

    // =========================
    // ✅ 1440×1024 고정 좌표계 + scale(--s)
    // =========================
    const BASE_W = 1440;
    const BASE_H = 1024;

    const frame = document.getElementById("frameMoonRoom");
    const canvas = document.getElementById("canvasMoonRoom");

    function setScale(){
      const s = Math.min(
        1,
        (window.innerWidth - 40) / BASE_W,
        (window.innerHeight - 40) / BASE_H
      );
      frame.style.setProperty("--s", s);
      canvas.style.setProperty("--s", s);
    }
    window.addEventListener("resize", setScale);
    setScale();

    function getScale(){
      const rect = frame.getBoundingClientRect();
      return rect.width / BASE_W;
    }

    // =========================
    // ✅ 배경색 랜덤 (진입 시 1회)
    // =========================
    const BG_COLORS = ["#2E4F4E", "#4A5142", "#2F3646", "#4B3C4C"];
    const BG_COLOR = BG_COLORS[(Math.random() * BG_COLORS.length) | 0];
    canvas.style.background = BG_COLOR;

    // =========================
    // ✅ Mood
    // =========================
    const MOOD = {
      colorHex: "#5ffbff",
      waterEmissiveIntensity: 2.2,
      lightIntensity: 1.25,
      lightDistance: 6.0,
      lightDecay: 2.0,
      bloom: { strength: 0.5, radius: 0.4, threshold: 0.75 }
    };

    const DEFAULT_MOOD = {
      waterEmissiveIntensity: MOOD.waterEmissiveIntensity,
      lightIntensity: MOOD.lightIntensity,
      lightDistance: MOOD.lightDistance,
      lightDecay: MOOD.lightDecay,
      bloom: { ...MOOD.bloom }
    };

    const BOTTLE_MOOD_OVERRIDES = {
      bt1: {
        waterEmissiveIntensity: 3.0,
        lightIntensity: 1.6,
        bloom: { strength: 0.85, threshold: 0.55 }
      },
      bt4: {
        waterEmissiveIntensity: 3.0,
        lightIntensity: 1.6,
        bloom: { strength: 0.85, threshold: 0.55 }
      },
      BT8: {
        waterEmissiveIntensity: 3.2,
        lightIntensity: 1.7,
        bloom: { strength: 0.9, threshold: 0.5 }
      },
      BT9: {
        waterEmissiveIntensity: 3.2,
        lightIntensity: 1.7,
        bloom: { strength: 0.9, threshold: 0.5 }
      }
    };

    function applyMoodOverridesForBottle(bottleName){
      const override = BOTTLE_MOOD_OVERRIDES[bottleName] || {};

      MOOD.waterEmissiveIntensity =
        override.waterEmissiveIntensity ?? DEFAULT_MOOD.waterEmissiveIntensity;
      MOOD.lightIntensity = override.lightIntensity ?? DEFAULT_MOOD.lightIntensity;
      MOOD.lightDistance = override.lightDistance ?? DEFAULT_MOOD.lightDistance;
      MOOD.lightDecay = override.lightDecay ?? DEFAULT_MOOD.lightDecay;

      MOOD.bloom = {
        ...DEFAULT_MOOD.bloom,
        ...(override.bloom || {})
      };
    }

    function setMoodColor(hex){
      MOOD.colorHex = hex;
      applyMood();
    }

    // =========================
    // ✅ Bottle 인터랙션 시스템
    // =========================
    const BOTTLE_COLORS = {
      "bt1": "#868580",
      "bt2": "#FF005C",
      "bt3": "#C260C1",
      "bt4": "#868580",
      "BT5": "#45FF24",
      "BT6": "#3BE2AF",
      "BT7": "#FFF110",
      "BT8": "#8A00FF",
      "BT9": "#004DFF",
      "BT10": "#3BE2AF"
    };

    let selectedBottle = null;

    // ✅ [FIX] outline 상태를 hover/selected로 분리
    let selectedObject = null;
    let hoveredObject = null;

    function updateOutline(){
      const arr = [];
      if (hoveredObject) arr.push(hoveredObject);
      if (selectedObject && selectedObject !== hoveredObject) arr.push(selectedObject);
      outlinePass.selectedObjects = arr;
    }

    function selectBottle(bottleName){
      if (!BOTTLE_COLORS[bottleName]) return;

      selectedBottle = bottleName;

      // ✅ 선택된 bottle 오브젝트 찾기
      const bottleObj = roomRoot?.getObjectByName(bottleName);
      if (bottleObj) {
        selectedObject = bottleObj;
        updateOutline();
      }
    }

    function clearSelectedBottle(){
      selectedBottle = null;
      selectedObject = null;
      updateOutline();
    }

    function applyBottleColorToCauldron(bottleName){
      const color = BOTTLE_COLORS[bottleName];
      if (color) {
        applyMoodOverridesForBottle(bottleName);
        setMoodColor(color);
      }
    }

    // =========================
    // ✅ Three 기본 셋업
    // =========================
    const host = document.getElementById("webglHost");

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
    renderer.setSize(BASE_W, BASE_H, false);
    renderer.setPixelRatio(1);

    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // ✅ clearColor는 sRGB(hex) -> Linear로 변환해서 넣어야 “원래 색감”에 가까움
    const clear = new THREE.Color(BG_COLOR);
    clear.convertSRGBToLinear();
    renderer.setClearColor(clear, 1);

    host.appendChild(renderer.domElement);
    renderer.domElement.style.width = BASE_W + "px";
    renderer.domElement.style.height = BASE_H + "px";
    renderer.domElement.style.display = "block";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, BASE_W / BASE_H, 0.01, 2000);
    camera.position.set(0, 0, 5);

    // =========================
    // ✅ 라이트
    // =========================
    const ambient = new THREE.AmbientLight(0xffffff, 1.05);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 0.85);
    dir.position.set(2, 3, 4);
    scene.add(dir);

    const glowLight = new THREE.PointLight(
      new THREE.Color(MOOD.colorHex),
      MOOD.lightIntensity,
      MOOD.lightDistance,
      MOOD.lightDecay
    );
    glowLight.visible = false;
    scene.add(glowLight);

    // =========================
    // ✅ OrbitControls
    // =========================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    controls.minAzimuthAngle = -Math.PI / 2;
    controls.maxAzimuthAngle = 0;

    controls.minPolarAngle = Math.PI / 4;
    controls.maxPolarAngle = Math.PI * 75 / 180;

    // =========================
    // ✅ Postprocessing: Render -> Outline(hover) -> Bloom
    // =========================
    const composer = new EffectComposer(renderer);
    composer.setSize(BASE_W, BASE_H);

    composer.addPass(new RenderPass(scene, camera));

    const outlinePass = new OutlinePass(new THREE.Vector2(BASE_W, BASE_H), scene, camera);
    outlinePass.edgeStrength = 8.0;  // 7.0 -> 8.0 (더 강하게)
    outlinePass.edgeThickness = 3.0;  // 2.8 -> 3.0 (더 두껍게)
    outlinePass.edgeGlow = 0.5;  // 0.35 -> 0.5 (더 밝게)
    outlinePass.pulsePeriod = 0;
    outlinePass.visibleEdgeColor.set("#ffffff");
    outlinePass.hiddenEdgeColor.set("#000000");
    composer.addPass(outlinePass);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(BASE_W, BASE_H),
      MOOD.bloom.strength,
      MOOD.bloom.radius,
      MOOD.bloom.threshold
    );
    composer.addPass(bloomPass);

    function applyBloomFromMood(){
      bloomPass.strength = MOOD.bloom.strength;
      bloomPass.radius = MOOD.bloom.radius;
      bloomPass.threshold = MOOD.bloom.threshold;
    }

    // =========================
    // ✅ GLB 로드 + bbox 기반 auto-fit
    // =========================
    const GLB_URL = "./assets/last_last_room.glb";

    const loader = new GLTFLoader();
    let roomRoot = null;
    let waterMesh = null;

    function fitCameraToObject(object3D){
      const box = new THREE.Box3().setFromObject(object3D);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      controls.target.copy(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = THREE.MathUtils.degToRad(camera.fov);
      let distance = (maxDim * 0.5) / Math.tan(fov * 0.5);
      distance *= 1.25;

      const dirVec = new THREE.Vector3()
        .subVectors(camera.position, controls.target)
        .normalize();

      if (!isFinite(dirVec.x) || dirVec.lengthSq() < 1e-8) {
        dirVec.set(0, 0.2, 1).normalize();
      }

      camera.position.copy(controls.target).addScaledVector(dirVec, distance);
      camera.lookAt(controls.target);

      camera.near = Math.max(0.01, maxDim / 100);
      camera.far  = Math.max(2000, maxDim * 30);
      camera.updateProjectionMatrix();

      controls.minDistance = maxDim * 0.25;
      controls.maxDistance = maxDim * 2.5;

      controls.update();
    }

    function applyMood(){
      const c = new THREE.Color(MOOD.colorHex);

      if (waterMesh && waterMesh.material){
        const mats = Array.isArray(waterMesh.material) ? waterMesh.material : [waterMesh.material];
        for (const m of mats){
          if (m.color) m.color.copy(c);
          if (m.emissive) m.emissive.copy(c);
          if (typeof m.emissiveIntensity === "number") {
            m.emissiveIntensity = MOOD.waterEmissiveIntensity;
          }
          m.needsUpdate = true;
        }
      }

      glowLight.color.copy(c);
      glowLight.intensity = MOOD.lightIntensity;
      glowLight.distance = MOOD.lightDistance;
      glowLight.decay = MOOD.lightDecay;

      applyBloomFromMood();
    }

    // =========================
    // ✅ BOOK POPUP (추가)
    // =========================
    const moonPopupOverlay = document.getElementById("moonPopupOverlay");
    const moonPopupEls = {
      book1: document.getElementById("moonPopup1"),
      book2: document.getElementById("moonPopup2"),
      book3: document.getElementById("moonPopup3"),
      book4: document.getElementById("moonPopup4"),
    };
    let popupOpen = false;

    function closeAllMoonPopups(){
      for (const k in moonPopupEls){
        moonPopupEls[k]?.classList.remove("is-on");
      }
    }

    function openMoonPopupFor(bookName){
      const el = moonPopupEls[bookName];
      if (!el) {
        console.warn("[MoonRoom] Popup element not found for:", bookName);
        return;
      }

      popupOpen = true;
      closeAllMoonPopups();

      moonPopupOverlay.classList.add("is-on");
      moonPopupOverlay.setAttribute("aria-hidden", "false");
      el.classList.add("is-on");

      // ✅ 팝업 열리면 컨트롤/호버 꺼서 "잡히는 느낌" 방지
      controls.enabled = false;
      clearHover();
    }

    function closeMoonPopup(){
      popupOpen = false;
      closeAllMoonPopups();

      moonPopupOverlay.classList.remove("is-on");
      moonPopupOverlay.setAttribute("aria-hidden", "true");

      // ✅ 팝업 닫히는 애니메이션(220ms) 완료 후 슬라이더 리셋
      setTimeout(() => {
        resetSlider("moonPopup1");
        resetSlider("moonPopup2");
        resetSlider("moonPopup3");
        resetSlider("moonPopup4");
      }, 250);

      controls.enabled = true;
      clearHover();
    }

    // ✅ X 버튼들
    document.querySelectorAll("[data-popup-close]").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        closeMoonPopup();
      });
    });

    // ✅ 오버레이 배경 클릭 시 닫기(팝업 이미지 클릭은 유지)
    moonPopupOverlay.addEventListener("click", (e) => {
      if (e.target === moonPopupOverlay) closeMoonPopup();
    });

    // =========================
    // ✅ 슬라이더 기능 (moon_popup1)
    // =========================
    const moonPopup1Slider = document.getElementById("moonPopup1Slider");
    let moonPopup1CurrentPage = 0;
    const moonPopup1TotalPages = 5;

    function updateSlider1(page){
      moonPopup1CurrentPage = Math.max(0, Math.min(page, moonPopup1TotalPages - 1));
      if (moonPopup1Slider) {
        const slides = moonPopup1Slider.querySelectorAll(".moon-popup-slide");
        slides.forEach((slide, index) => {
          if (index === moonPopup1CurrentPage) slide.classList.add("is-active");
          else slide.classList.remove("is-active");
        });
        moonPopup1Slider.setAttribute("data-page", moonPopup1CurrentPage);
      }
    }

    function resetSlider(sliderId){
      if (sliderId === "moonPopup1") {
        moonPopup1CurrentPage = 0; updateSlider1(0);
      } else if (sliderId === "moonPopup2") {
        moonPopup2CurrentPage = 0; updateSlider2(0);
      } else if (sliderId === "moonPopup3") {
        moonPopup3CurrentPage = 0; updateSlider3(0);
      } else if (sliderId === "moonPopup4") {
        moonPopup4CurrentPage = 0; updateSlider4(0);
      }
    }

    function goToSliderPage(sliderId, direction){
      if (sliderId === "moonPopup1") {
        const newPage = direction === "next" ? moonPopup1CurrentPage + 1 : moonPopup1CurrentPage - 1;
        updateSlider1(newPage);
      } else if (sliderId === "moonPopup2") {
        const newPage = direction === "next" ? moonPopup2CurrentPage + 1 : moonPopup2CurrentPage - 1;
        updateSlider2(newPage);
      } else if (sliderId === "moonPopup3") {
        const newPage = direction === "next" ? moonPopup3CurrentPage + 1 : moonPopup3CurrentPage - 1;
        updateSlider3(newPage);
      } else if (sliderId === "moonPopup4") {
        const newPage = direction === "next" ? moonPopup4CurrentPage + 1 : moonPopup4CurrentPage - 1;
        updateSlider4(newPage);
      }
    }

    // ✅ 화살표 버튼 이벤트
    document.querySelectorAll("[data-slider]").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const sliderId = btn.dataset.slider;
        const direction = btn.dataset.direction;
        goToSliderPage(sliderId, direction);
      });
    });

    // =========================
    // ✅ 슬라이더 기능 (moon_popup2)
    // =========================
    const moonPopup2Slider = document.getElementById("moonPopup2Slider");
    let moonPopup2CurrentPage = 0;
    const moonPopup2TotalPages = 6;

    function updateSlider2(page){
      moonPopup2CurrentPage = Math.max(0, Math.min(page, moonPopup2TotalPages - 1));
      if (moonPopup2Slider) {
        const slides = moonPopup2Slider.querySelectorAll(".moon-popup-slide");
        slides.forEach((slide, index) => {
          if (index === moonPopup2CurrentPage) slide.classList.add("is-active");
          else slide.classList.remove("is-active");
        });
        moonPopup2Slider.setAttribute("data-page", moonPopup2CurrentPage);
      }
    }

    // =========================
    // ✅ 슬라이더 기능 (moon_popup3)
    // =========================
    const moonPopup3Slider = document.getElementById("moonPopup3Slider");
    let moonPopup3CurrentPage = 0;
    const moonPopup3TotalPages = 6;

    function updateSlider3(page){
      moonPopup3CurrentPage = Math.max(0, Math.min(page, moonPopup3TotalPages - 1));
      if (moonPopup3Slider) {
        const slides = moonPopup3Slider.querySelectorAll(".moon-popup-slide");
        slides.forEach((slide, index) => {
          if (index === moonPopup3CurrentPage) slide.classList.add("is-active");
          else slide.classList.remove("is-active");
        });
        moonPopup3Slider.setAttribute("data-page", moonPopup3CurrentPage);
      }
    }

    // =========================
    // ✅ 슬라이더 기능 (moon_popup4)
    // =========================
    const moonPopup4Slider = document.getElementById("moonPopup4Slider");
    let moonPopup4CurrentPage = 0;
    const moonPopup4TotalPages = 5;

    function updateSlider4(page){
      moonPopup4CurrentPage = Math.max(0, Math.min(page, moonPopup4TotalPages - 1));
      if (moonPopup4Slider) {
        const slides = moonPopup4Slider.querySelectorAll(".moon-popup-slide");
        slides.forEach((slide, index) => {
          if (index === moonPopup4CurrentPage) slide.classList.add("is-active");
          else slide.classList.remove("is-active");
        });
        moonPopup4Slider.setAttribute("data-page", moonPopup4CurrentPage);
      }
    }

    // ✅ 슬라이더 초기화
    if (moonPopup1Slider) updateSlider1(0);
    if (moonPopup2Slider) updateSlider2(0);
    if (moonPopup3Slider) updateSlider3(0);
    if (moonPopup4Slider) updateSlider4(0);

    // =========================
    // ✅ Raycaster: 클릭 + Hover(외곽선) (캐싱+스로틀)
    // =========================
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();

    const INTERACT_NAMES = new Set([
      "cauldron001",
      "Water_Surface",
      "book1","book2","book3","book4",
      "bt1","bt2","bt3","bt4",
      "BT5","BT6","BT7","BT8","BT9","BT10"
    ]);

    // ✅ 인터랙티브 대상만 따로 캐싱해둘 배열(성능 핵심)
    let interactRoots = [];

    function findInteractiveName(obj){
      let cur = obj;
      while (cur){
        if (typeof cur.name === "string" && INTERACT_NAMES.has(cur.name)) return cur.name;
        cur = cur.parent || null;
      }
      return null;
    }

    function findInteractiveRoot(obj){
      let cur = obj;
      while (cur){
        if (typeof cur.name === "string" && INTERACT_NAMES.has(cur.name)) return cur;
        cur = cur.parent || null;
      }
      return null;
    }

    function setRayFromEvent(e){
      const rect = frame.getBoundingClientRect();
      const s = getScale();

      const x = (e.clientX - rect.left) / s;
      const y = (e.clientY - rect.top) / s;

      if (x < 0 || y < 0 || x > BASE_W || y > BASE_H) return false;

      ndc.x = (x / BASE_W) * 2 - 1;
      ndc.y = -(y / BASE_H) * 2 + 1;
      raycaster.setFromCamera(ndc, camera);
      return true;
    }

    function onClick(e){
      // ✅ 팝업 열려있으면 3D 클릭 막기
      if (popupOpen) return;

      if (!roomRoot) return;
      if (!setRayFromEvent(e)) return;
      if (!interactRoots.length) return;

      const hits = raycaster.intersectObjects(interactRoots, true);
      if (!hits || hits.length === 0) return;

      for (const hit of hits){
        const name = findInteractiveName(hit.object);
        if (!name) continue;

        // ✅ book1~book4는 팝업으로 처리
        if (name === "book1" || name === "book2" || name === "book3" || name === "book4") {
          openMoonPopupFor(name);
          return;
        }

        // ✅ bottle 클릭 시 선택
        if (BOTTLE_COLORS[name]) {
          selectBottle(name);
          return;
        }

        // ✅ 가마솥 클릭 시 선택된 bottle 색상 적용
        if (name === "cauldron001") {
          if (selectedBottle) {
            applyBottleColorToCauldron(selectedBottle);
            // ✅ 가마솥 클릭 후 bottle 선택 해제 (선택사항)
            clearSelectedBottle();
          }
          return;
        }

        return;
      }
    }
    renderer.domElement.addEventListener("click", onClick);

    // ✅ Hover 상태
    let hovered = null;

    function clearHover(){
      hovered = null;
      hoveredObject = null;
      updateOutline();
      renderer.domElement.style.cursor = "default";
    }

    // ✅ pointermove 스로틀 최적화 (더 빠른 반응)
    let lastHoverCheck = 0;
    const HOVER_INTERVAL_MS = 16;

    function onPointerMove(e){
      // ✅ 팝업 열려있으면 hover도 막기
      if (popupOpen) { clearHover(); return; }

      if (!roomRoot) return;

      const now = performance.now();
      if (now - lastHoverCheck < HOVER_INTERVAL_MS) return;
      lastHoverCheck = now;

      if (!setRayFromEvent(e)) { clearHover(); return; }
      if (!interactRoots.length) { clearHover(); return; }

      raycaster.params.Points = { threshold: 0.1 };
      raycaster.params.Line = { threshold: 0.1 };
      
      const hits = raycaster.intersectObjects(interactRoots, true);
      if (!hits || hits.length === 0) { 
        if (hovered) clearHover();
        return; 
      }

      let found = null;
      for (const hit of hits){
        const root = findInteractiveRoot(hit.object);
        if (root) { found = root; break; }
      }

      if (!found) { 
        if (hovered) clearHover();
        return; 
      }

      if (hovered === found) return;

      hovered = found;
      hoveredObject = found;
      updateOutline();
      renderer.domElement.style.cursor = "pointer";
    }

    renderer.domElement.addEventListener("pointermove", onPointerMove);
    renderer.domElement.addEventListener("pointerleave", clearHover);

    // =========================
    // ✅ [FIX] bottle material 완전 분리 (사라짐 현상 방지)
    // =========================
    function cloneMaterialsForObject(root, nameSet){
      root.traverse((o) => {
        if (!o.isMesh) return;
        if (!nameSet.has(o.name)) return;

        const m = o.material;
        if (!m) return;

        if (Array.isArray(m)) o.material = m.map(mat => mat.clone());
        else o.material = m.clone();

        o.material.needsUpdate = true;
      });
    }

    // =========================
    // ✅ 로드 시작/완료 처리
    // =========================
    const fade = document.getElementById("moonRoomFade");

    loader.load(
      GLB_URL,
      (gltf) => {
        roomRoot = gltf.scene;
        scene.add(roomRoot);

        // 텍스처 색공간 보정
        roomRoot.traverse((o) => {
          if (!o.isMesh) return;
          const m = o.material;
          if (!m) return;

          const mats = Array.isArray(m) ? m : [m];
          for (const mat of mats){
            if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
            if (mat.emissiveMap) mat.emissiveMap.colorSpace = THREE.SRGBColorSpace;
            mat.needsUpdate = true;
          }
        });

        // ✅ [FIX] bottle material 완전 분리 (OutlinePass/공유재질 꼬임 방지)
        cloneMaterialsForObject(roomRoot, new Set([
          "bt1","bt2","bt3","bt4",
          "BT5","BT6","BT7","BT8","BT9","BT10"
        ]));

        // ✅ 인터랙티브 대상만 캐싱 (성능 핵심)
        interactRoots = [];
        for (const name of INTERACT_NAMES){
          const o = roomRoot.getObjectByName(name);
          if (o) interactRoots.push(o);
        }

        waterMesh = roomRoot.getObjectByName("Water_Surface") || null;
        if (waterMesh && waterMesh.material) {
          const mats = Array.isArray(waterMesh.material)
            ? waterMesh.material
            : [waterMesh.material];
          const cloned = mats.map((mat) => mat.clone());
          waterMesh.material = Array.isArray(waterMesh.material) ? cloned : cloned[0];
        }

        fitCameraToObject(roomRoot);

        if (waterMesh){
          const p = new THREE.Vector3();
          waterMesh.getWorldPosition(p);
          glowLight.position.copy(p).add(new THREE.Vector3(0, 0.12, 0));
          glowLight.visible = true;
        } else {
          glowLight.visible = false;
        }

        applyMood();
        requestAnimationFrame(() => fade?.classList.add("is-off"));
      },
      undefined,
      (err) => {
        console.error("[MoonRoom] GLB load failed:", err);
        requestAnimationFrame(() => fade?.classList.add("is-off"));
      }
    );

    // =========================
    // ✅ 렌더 루프
    // =========================
    function tick(){
      controls.update();
      composer.render();
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // =========================
    // ✅ 별가루 트레일 효과 (friends.html과 동일)
    // =========================
    const starCanvas = document.getElementById("starTrail");
    const starCtx = starCanvas?.getContext("2d", { alpha: true });

    const STAR_MAX = 120;
    const STAR_SPAWN_RATE = 3;
    const STAR_LIFE_MIN = 420;
    const STAR_LIFE_MAX = 900;
    const STAR_SPEED_MIN = 0.35;
    const STAR_SPEED_MAX = 1.45;

    const STAR_COLORS = [
      "rgba(221,241,255,0.98)",
      "rgba(221,241,255,0.92)",
      "rgba(221,241,255,0.85)"
    ];

    let starParticles = [];
    let starRunning = true;
    let lastMouse = null;

    function getScaleMoonRoom(){
      const rect = frame.getBoundingClientRect();
      return rect.width / BASE_W;
    }

    function getLocalPosFromEvent(e){
      const rect = frame.getBoundingClientRect();
      const s = getScaleMoonRoom();

      const cx = (e.clientX - rect.left) / s;
      const cy = (e.clientY - rect.top) / s;

      if (cx < 0 || cy < 0 || cx > BASE_W || cy > BASE_H) return null;
      return { x: cx, y: cy };
    }

    function rand(min, max){ return min + Math.random() * (max - min); }
    function pick(arr){ return arr[(Math.random() * arr.length) | 0]; }

    function spawnStars(x, y, dx, dy){
      if (!starRunning) return;

      const dirLen = Math.hypot(dx, dy) || 1;
      const ndx = dx / dirLen;
      const ndy = dy / dirLen;

      for (let i = 0; i < STAR_SPAWN_RATE; i++){
        if (starParticles.length >= STAR_MAX) starParticles.shift();

        const ox = rand(-10, 10);
        const oy = rand(-10, 10);

        const speed = rand(STAR_SPEED_MIN, STAR_SPEED_MAX);
        const spread = rand(0.35, 1.1);

        const vx = (ndx * speed * rand(0.6, 1.2)) + rand(-spread, spread);
        const vy = (ndy * speed * rand(0.6, 1.2)) + rand(-spread, spread);

        const life = rand(STAR_LIFE_MIN, STAR_LIFE_MAX);

        starParticles.push({
          x: x + ox,
          y: y + oy,
          px: x + ox,
          py: y + oy,
          vx,
          vy,
          t: 0,
          life,
          size: rand(0.7, 2.0),
          color: pick(STAR_COLORS),
          twist: rand(-0.03, 0.03)
        });
      }
    }

    function drawParticle(p, alpha){
      starCtx.save();
      starCtx.globalCompositeOperation = "lighter";
      starCtx.globalAlpha = alpha;

      starCtx.strokeStyle = p.color;
      starCtx.lineWidth = Math.max(0.6, p.size);
      starCtx.beginPath();
      starCtx.moveTo(p.px, p.py);
      starCtx.lineTo(p.x, p.y);
      starCtx.stroke();

      starCtx.fillStyle = p.color;
      starCtx.beginPath();
      starCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      starCtx.fill();

      starCtx.restore();
    }

    let lastFrame = performance.now();
    function tickStars(now){
      if (!starCtx) return;
      
      if (popupOpen) {
        requestAnimationFrame(tickStars);
        return;
      }

      const dt = now - lastFrame;
      lastFrame = now;

      starCtx.clearRect(0, 0, BASE_W, BASE_H);

      const next = [];
      for (const p of starParticles){
        p.t += dt;
        if (p.t >= p.life) continue;

        const u = p.t / p.life;
        const alpha = (u < 0.15)
          ? (u / 0.15) * 0.9
          : (u < 0.75)
            ? 0.9
            : (1 - (u - 0.75) / 0.25) * 0.9;

        const tvx = p.vx - p.vy * p.twist;
        const tvy = p.vy + p.vx * p.twist;

        p.px = p.x;
        p.py = p.y;

        p.x += tvx * (dt / 16.67);
        p.y += tvy * (dt / 16.67);

        drawParticle(p, alpha);
        next.push(p);
      }

      starParticles = next;
      requestAnimationFrame(tickStars);
    }

    if (starCanvas && starCtx){
      window.addEventListener("mousemove", (e) => {
        if (popupOpen) return;
        
        const pos = getLocalPosFromEvent(e);
        if (!pos) { lastMouse = null; return; }

        if (!lastMouse){
          lastMouse = { x: pos.x, y: pos.y };
          spawnStars(pos.x, pos.y, 1, 0);
          return;
        }

        const dx = pos.x - lastMouse.x;
        const dy = pos.y - lastMouse.y;

        if (Math.hypot(dx, dy) >= 0.8){
          spawnStars(pos.x, pos.y, dx, dy);
          lastMouse = { x: pos.x, y: pos.y };
        }
      });

      window.addEventListener("touchmove", (e) => {
        const t = e.touches?.[0];
        if (!t) return;
        const pos = getLocalPosFromEvent(t);
        if (!pos) return;
        spawnStars(pos.x, pos.y, 1, 0);
      }, { passive: true });

      requestAnimationFrame(tickStars);
    }

    window.setMoodColor = setMoodColor;

    // =========================
    // ✅ Navigation Tokens
    // =========================
    document.getElementById("MoonGo")?.addEventListener("click", () => {
      window.location.href = "./moon-room.html";
    });

    document.getElementById("SunGo")?.addEventListener("click", () => {
      // window.location.href = "./sun-room.html";
    });

    document.getElementById("HomeGo")?.addEventListener("click", () => {
      window.location.href = "./index.html";
    });
  </script>
