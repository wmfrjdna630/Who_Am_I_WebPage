<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moon Room</title>
  <link rel="stylesheet" href="./style.css" />

  <!-- ✅ Three.js ESM importmap -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!-- ✅ 이 페이지에서만 필요한 최소 스타일(구조는 유지, 추가 요소만) -->
  <style>
    /* 캔버스 내부에 WebGL을 “연출 레이어”로 얹기 */
    .moonroom-webgl {
      position: absolute;
      left: 0; top: 0;
      width: 1440px;
      height: 1024px;
      z-index: 2;
      pointer-events: auto; /* 나중에 raycast 클릭을 위해 켜둠 */
    }

    /* 로딩 중/전환용 검정 페이드 (friends의 검정 → room 진입을 자연스럽게) */
    .moonroom-fade {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 1;
      transition: opacity 900ms ease;
      z-index: 9999;
      pointer-events: none;
    }
    .moonroom-fade.is-off { opacity: 0; }
  </style>
</head>

<body>
  <div class="stage">
    <main class="frame" id="frameMoonRoom">
      <!-- ✅ 1440×1024 좌표계 캔버스 -->
      <div class="canvas" id="canvasMoonRoom" style="background:#000;">
        <!-- ✅ WebGL 들어갈 자리 -->
        <div id="webglHost" class="moonroom-webgl" aria-hidden="true"></div>

        <!-- ✅ 진입 페이드 (검정에서 서서히 등장) -->
        <div class="moonroom-fade" id="moonRoomFade" aria-hidden="true"></div>
      </div>
    </main>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    // =========================
    // ✅ 1440×1024 고정 좌표계 + scale(--s) (index/moon/friends 동일)
    // =========================
    const BASE_W = 1440;
    const BASE_H = 1024;

    const frame = document.getElementById("frameMoonRoom");
    const canvas = document.getElementById("canvasMoonRoom");

    function setScale() {
      const s = Math.min(
        1,
        (window.innerWidth - 40) / BASE_W,
        (window.innerHeight - 40) / BASE_H
      );
      frame.style.setProperty("--s", s);
      canvas.style.setProperty("--s", s);
    }
    window.addEventListener("resize", setScale);
    setScale();

    function getScale() {
      const rect = frame.getBoundingClientRect();
      return rect.width / BASE_W;
    }

    // =========================
    // ✅ Three 기본 셋업 (1440×1024 내부 렌더 크기 고정)
    // =========================
    const host = document.getElementById("webglHost");

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,          // 필요 시 배경 합성 가능
      preserveDrawingBuffer: false
    });
    renderer.setSize(BASE_W, BASE_H, false);
    renderer.setPixelRatio(1);  // ✅ 내부 픽셀 비율도 고정(철학 유지)
    host.appendChild(renderer.domElement);

    // domElement도 1440×1024 고정
    renderer.domElement.style.width = BASE_W + "px";
    renderer.domElement.style.height = BASE_H + "px";
    renderer.domElement.style.display = "block";

    const scene = new THREE.Scene();

    // 카메라는 GLB 로드 후 bounding box로 fit할 것
    const camera = new THREE.PerspectiveCamera(35, BASE_W / BASE_H, 0.01, 1000);
    camera.position.set(0, 0, 5);

    // 라이트 (최소)
    const ambient = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 0.9);
    dir.position.set(2, 3, 4);
    scene.add(dir);

    // =========================
    // ✅ OrbitControls (확정된 절대 변경 불가 기준 그대로 적용)
    // =========================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    // ✅ 확정 회전 제한
    controls.minAzimuthAngle = -Math.PI / 2;
    controls.maxAzimuthAngle = 0;

    controls.minPolarAngle = Math.PI / 4;
    controls.maxPolarAngle = Math.PI / 2;

    // (관람 UX) 필요하면 패닝/줌은 다음 단계에서 결정해도 됨
    // 여기서는 일단 기본값 유지 (바꾸자고 제안 안 함)

    // =========================
    // ✅ GLB 로드 + bounding box 기반 auto-fit
    // =========================
    const GLB_URL = "./assets/room.glb"; // ✅ 추측입니다. 실제 위치에 맞게 수정하세요.

    const loader = new GLTFLoader();

    let roomRoot = null;

    function fitCameraToObject(object3D) {
      const box = new THREE.Box3().setFromObject(object3D);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // controls target = center
      controls.target.copy(center);

      // 카메라 거리 계산: 가장 큰 축 기준으로 적당히 맞춤
      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = THREE.MathUtils.degToRad(camera.fov);
      let distance = (maxDim * 0.5) / Math.tan(fov * 0.5);

      // 약간의 여유(너무 딱 붙지 않게)
      distance *= 1.25;

      // ✅ “이때 설정된 카메라 방향이 azimuthAngle = 0 기준”
      // -> load 직후의 camera 방향을 기준으로 controls를 세팅하는 의미로,
      //    여기서는 center를 바라보는 기본 방향(현재 camera 위치 방향)을 유지한 채 distance만 맞춤.
      const dir = new THREE.Vector3()
        .subVectors(camera.position, controls.target)
        .normalize();

      // 혹시 초기 dir이 0이면 안전 처리
      if (!isFinite(dir.x) || dir.lengthSq() < 1e-8) {
        dir.set(0, 0.2, 1).normalize();
      }

      camera.position.copy(controls.target).addScaledVector(dir, distance);
      camera.lookAt(controls.target);

      // near/far: 모델 크기 기준
      camera.near = Math.max(0.01, maxDim / 100);
      camera.far  = Math.max(1000, maxDim * 20);
      camera.updateProjectionMatrix();

      // distance 제한도 모델 기준
      controls.minDistance = maxDim * 0.25;
      controls.maxDistance = maxDim * 2.5;

      controls.update();
    }

    loader.load(
      GLB_URL,
      (gltf) => {
        roomRoot = gltf.scene;
        scene.add(roomRoot);

        // 모델이 너무 어둡거나 밝으면 라이트 조정은 “다음 단계”에서 (지금은 손 안 댐)
        fitCameraToObject(roomRoot);

        // ✅ 로드 완료 후 페이드 아웃
        const fade = document.getElementById("moonRoomFade");
        requestAnimationFrame(() => fade?.classList.add("is-off"));
      },
      undefined,
      (err) => {
        console.error("[MoonRoom] GLB load failed:", err);
        // 실패해도 검정 화면 유지(깨진 장면 노출 방지)
      }
    );

    // =========================
    // ✅ (임시) 렌더 루프
    // =========================
    function tick() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // =========================
    // ✅ (다음 단계용) 마우스 좌표를 1440×1024 로컬로 변환하는 함수만 미리 준비
    // =========================
    function getLocalPosFromEvent(e) {
      const rect = frame.getBoundingClientRect();
      const s = getScale();

      const x = (e.clientX - rect.left) / s;
      const y = (e.clientY - rect.top) / s;

      if (x < 0 || y < 0 || x > 1440 || y > 1024) return null;
      return { x, y };
    }

    // (클릭 타겟 제한 + 병/책/가마솥 클릭 반응은 다음 단계에서 붙임)
  </script>
</body>
</html>
