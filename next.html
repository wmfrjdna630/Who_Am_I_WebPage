            </g>
          </svg>
        </div>

        <canvas class="next-draw" id="drawCanvas" width="1440" height="1024" aria-hidden="true"></canvas>

      </div>
    </main>
  </div>

  <script>
    // ✅ index/moon과 완전히 동일한 스케일 계산
    const BASE_W = 1440;
    const BASE_H = 1024;

    const frame = document.getElementById("frameNext");
    const canvas = document.getElementById("canvasNext");

    function setScale() {
      const s = Math.min(
        1,
        (window.innerWidth - 40) / BASE_W,
        (window.innerHeight - 40) / BASE_H
      );
      frame.style.setProperty("--s", s);
      canvas.style.setProperty("--s", s);
    }

    window.addEventListener("resize", setScale);
    setScale();

    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter") e.preventDefault();
    });

    const drawCanvas = document.getElementById("drawCanvas");
    const drawCtx = drawCanvas?.getContext("2d");
    const START_POS = { x: 718.7, y: 486.63 };
    const END_POS = { x: 399.5, y: 427.5 };
    const DOT_POINTS = [
      START_POS,
      { x: 749.68, y: 460.83 },
      { x: 686.47, y: 513.43 },
      { x: 666.03, y: 540.38 },
      { x: 654.47, y: 578.17 },
      { x: 651.74, y: 611.03 },
      { x: 660.43, y: 641.95 },
      { x: 672.45, y: 674.86 },
      { x: 688.83, y: 705.81 },
      { x: 712.55, y: 731.95 },
      { x: 739.51, y: 750.66 },
      { x: 770.57, y: 771.49 },
      { x: 804.5, y: 784.89 },
      { x: 838.57, y: 795.69 },
      { x: 871.17, y: 801.15 },
      { x: 903.68, y: 799.04 },
      { x: 938.92, y: 794.96 },
      { x: 974.44, y: 781.95 },
      { x: 1007.16, y: 756.52 },
      { x: 1038.55, y: 722.66 },
      { x: 1056.07, y: 680.55 },
      { x: 1069.37, y: 643.14 },
      { x: 1080.34, y: 596.06 },
      { x: 1077.65, y: 552.26 },
      { x: 1069.63, y: 509.68 },
      { x: 1054.35, y: 482.71 },
      { x: 1024.61, y: 444.39 },
      { x: 990.63, y: 410.77 },
      { x: 951.25, y: 394 },
      { x: 912.36, y: 378.1 },
      { x: 874.18, y: 374.23 },
      { x: 831.1, y: 383.25 },
      { x: 798.5, y: 410.41 },
      { x: 823.05, y: 443.62 },
      { x: 821.54, y: 483.55 },
      { x: 786.21, y: 510.95 },
      { x: 751.08, y: 515.41 },
      { x: 725.81, y: 442.88 },
      { x: 686.96, y: 418.41 },
      { x: 652.31, y: 398.31 },
      { x: 620.61, y: 382.94 },
      { x: 585.41, y: 377.09 },
      { x: 552.93, y: 372.5 },
      { x: 510.5, y: 374.69 },
      { x: 470.5, y: 386.5 },
      { x: 435.5, y: 402.5 },
      END_POS
    ];
    const START_RADIUS = 18;
    const SNAP_RADIUS = 24;
    let drawing = false;
    let lastSnap = null;
    let completed = false;
    let currentIndex = 0;

    function clearDrawing(){
      if (!drawCtx) return;
      drawCtx.clearRect(0, 0, BASE_W, BASE_H);
    }

    function isNear(pos, target, radius){
      const dx = pos.x - target.x;
      const dy = pos.y - target.y;
      return (dx * dx + dy * dy) <= radius * radius;
    }

    function startDrawing(){
      if (!drawCtx) return;
      clearDrawing();
      drawing = true;
      completed = false;
      lastSnap = START_POS;
      currentIndex = 0;
      drawCtx.strokeStyle = "#FFF9EB";
      drawCtx.lineWidth = 3;
      drawCtx.lineCap = "round";
      drawCtx.lineJoin = "round";
      drawCtx.beginPath();
      drawCtx.moveTo(START_POS.x, START_POS.y);
    }

    function continueDrawing(pos){
      if (!drawCtx || !drawing || !lastSnap) return;
      const nextIndex = currentIndex + 1;
      if (nextIndex >= DOT_POINTS.length) return;
      const target = DOT_POINTS[nextIndex];
      if (!isNear(pos, target, SNAP_RADIUS)) return;
      drawCtx.lineTo(target.x, target.y);
      drawCtx.stroke();
      lastSnap = target;
      if (target.x === END_POS.x && target.y === END_POS.y) {
        completed = true;
        drawing = false;
      }
      currentIndex = nextIndex;
    }

    function stopDrawing(pos){
      if (!drawing) return;
      drawing = false;
      if (!completed) clearDrawing();
    }

    // ===============================
    // ✨ 은하수/별가루 트레일 (1440×1024 고정 좌표계 + scale 완벽 호환)
    // ===============================
    const starCanvas = document.getElementById("starTrail");
    const starCtx = starCanvas?.getContext("2d", { alpha: true });

    /* 성능/감성 튜닝값 */
    const STAR_MAX = 140;           // 화면에 유지되는 입자 최대치
    const STAR_SPAWN_RATE = 3;      // 마우스 이동 1회당 생성 개수
    const STAR_LIFE_MIN = 420;      // ms
    const STAR_LIFE_MAX = 900;      // ms
    const STAR_SPEED_MIN = 0.35;
    const STAR_SPEED_MAX = 1.45;

    /* 은하수 컬러 팔레트(은은한 푸/보 + 화이트) */
    const STAR_COLORS = [
    "rgba(254,255,221,0.98)",
    "rgba(254,255,221,0.92)",
    "rgba(254,255,221,0.85)"
    ];

    let starParticles = [];
    let starRunning = true;
    let lastMouse = null;

    // index처럼 frame 기준 실제 스케일을 얻는다 (frameRect.width / 1440)
    function getScaleFriends(){
      const rect = frame.getBoundingClientRect();
      return rect.width / 1440;
    }

    // frame 내부에서만 생성되게 (바깥으로 나가면 멈춤)
    function getLocalPosFromEvent(e){
      const rect = frame.getBoundingClientRect();
      const s = getScaleFriends();

      const cx = (e.clientX - rect.left) / s;
      const cy = (e.clientY - rect.top) / s;

      if (cx < 0 || cy < 0 || cx > 1440 || cy > 1024) return null;
      return { x: cx, y: cy };
    }

    function rand(min, max){ return min + Math.random() * (max - min); }
    function pick(arr){ return arr[(Math.random() * arr.length) | 0]; }

    function spawnStars(x, y, dx, dy){
      if (!starRunning) return;

      // 마우스 이동 방향이 있으면 그 방향으로 "촤라락" 흐름을 준다
      const dirLen = Math.hypot(dx, dy) || 1;
      const ndx = dx / dirLen;
      const ndy = dy / dirLen;

      for (let i = 0; i < STAR_SPAWN_RATE; i++){
        if (starParticles.length >= STAR_MAX) starParticles.shift();

        // 마우스 주변 랜덤 오프셋(은하수 흩날림)
        const ox = rand(-10, 10);
        const oy = rand(-10, 10);

        // 이동 벡터: 마우스 진행 방향 + 랜덤 퍼짐
        const speed = rand(STAR_SPEED_MIN, STAR_SPEED_MAX);
        const spread = rand(0.35, 1.1);

        const vx = (ndx * speed * rand(0.6, 1.2)) + rand(-spread, spread);
        const vy = (ndy * speed * rand(0.6, 1.2)) + rand(-spread, spread);

        const life = rand(STAR_LIFE_MIN, STAR_LIFE_MAX);

        starParticles.push({
          x: x + ox,
          y: y + oy,
          px: x + ox,
          py: y + oy,
          vx,
          vy,
          t: 0,
          life,
          size: rand(0.7, 2.0),
          glow: rand(2.5, 7.5),
          color: pick(STAR_COLORS),
          twist: rand(-0.03, 0.03) // 살짝 휘는 느낌
        });
      }
    }

    function drawParticle(p, alpha){
      // “촤라락” 느낌: 점 + 짧은 선(이전 위치->현재 위치)
      starCtx.save();
      starCtx.globalCompositeOperation = "lighter";
      starCtx.globalAlpha = alpha;

      // 은은한 글로우
      starCtx.shadowBlur = p.glow;
      starCtx.shadowColor = p.color;

      // 라인(꼬리)
      starCtx.strokeStyle = p.color;
      starCtx.lineWidth = Math.max(0.6, p.size);
      starCtx.beginPath();
      starCtx.moveTo(p.px, p.py);
      starCtx.lineTo(p.x, p.y);
      starCtx.stroke();

      // 핵심 점(반짝)
      starCtx.fillStyle = p.color;
      starCtx.beginPath();
      starCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      starCtx.fill();

      starCtx.restore();
    }

    let lastFrame = performance.now();
    function tickStars(now){
      if (!starCtx) return;

      const dt = now - lastFrame;
      lastFrame = now;

      // 완전 투명 레이어라서 "검정 페이드 덮기" 같은 방식은 안 씀(밑이 어두워짐 방지)
      starCtx.clearRect(0, 0, 1440, 1024);

      // 업데이트 + 그리기
      const next = [];
      for (const p of starParticles){
        p.t += dt;
        if (p.t >= p.life) continue;

        // 알파 곡선: 초반 반짝 -> 중반 유지 -> 후반 서서히 사라짐
        const u = p.t / p.life;
        const alpha = (u < 0.15)
          ? (u / 0.15) * 0.9
          : (u < 0.75)
            ? 0.9
            : (1 - (u - 0.75) / 0.25) * 0.9;

        // 살짝 휘는(은하수 흐름) 느낌
        const tvx = p.vx - p.vy * p.twist;
        const tvy = p.vy + p.vx * p.twist;

        p.px = p.x;
        p.py = p.y;

        p.x += tvx * (dt / 16.67);
        p.y += tvy * (dt / 16.67);

        drawParticle(p, alpha);
        next.push(p);
      }

      starParticles = next;
      requestAnimationFrame(tickStars);
    }

    if (starCanvas && starCtx){
      // 마우스 이동 시 생성
      window.addEventListener("mousemove", (e) => {
        const pos = getLocalPosFromEvent(e);
        if (!pos) { lastMouse = null; return; }

        if (!lastMouse){
          lastMouse = { x: pos.x, y: pos.y };
          spawnStars(pos.x, pos.y, 1, 0);
          return;
        }

        const dx = pos.x - lastMouse.x;
        const dy = pos.y - lastMouse.y;

        // 너무 미세한 움직임은 생성 안 해서 "지저분함" 방지
        if (Math.hypot(dx, dy) >= 0.8){
          spawnStars(pos.x, pos.y, dx, dy);
          lastMouse = { x: pos.x, y: pos.y };
        }
      });

      // 터치(모바일)도 살짝 지원 (필요 없으면 지워도 됨)
      window.addEventListener("touchmove", (e) => {
        const t = e.touches?.[0];
        if (!t) return;
        const pos = getLocalPosFromEvent(t);
        if (!pos) return;
        spawnStars(pos.x, pos.y, 1, 0);
      }, { passive: true });

      requestAnimationFrame(tickStars);
    }

    if (drawCanvas && drawCtx){
      drawCanvas.addEventListener("pointerdown", (e) => {
        const pos = getLocalPosFromEvent(e);
        if (!pos || !isNear(pos, START_POS, START_RADIUS)) return;
        startDrawing();
      });

      drawCanvas.addEventListener("pointermove", (e) => {
        if (!drawing) return;
        const pos = getLocalPosFromEvent(e);
        if (!pos) { stopDrawing(null); return; }
        continueDrawing(pos);
      });

      drawCanvas.addEventListener("pointerup", (e) => {
        const pos = getLocalPosFromEvent(e);
        stopDrawing(pos);
      });

      drawCanvas.addEventListener("pointerleave", () => {
        stopDrawing(null);
      });
    }
  </script>
